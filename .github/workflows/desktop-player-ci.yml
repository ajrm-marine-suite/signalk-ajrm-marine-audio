name: Desktop Player CI

on:
  push:
    branches: [main]
    paths:
      - "desktop-player/**"
      - ".github/workflows/desktop-player-ci.yml"
  pull_request:
    paths:
      - "desktop-player/**"
      - ".github/workflows/desktop-player-ci.yml"

permissions:
  contents: read

jobs:
  desktop-player:
    name: Desktop player on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22]

    defaults:
      run:
        working-directory: desktop-player

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: desktop-player/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run desktop player checks
        run: npm test
